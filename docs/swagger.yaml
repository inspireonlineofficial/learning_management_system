schemes:
  - http
  - https
swagger: '2.0'
info:
  description: REST API for the LMS platform covering auth, courses, enrollments, assessments, payments, and more.
  title: LMS Backend API
  contact: {}
  version: 1.0.0
host: localhost:8080
basePath: /
paths:
  /v1/.well-known/jwks.json:
    get:
      description: Returns the public keys used to verify JWT tokens issued by this server
      produces:
        - application/json
      tags:
        - auth
      summary: Get JSON Web Key Set
      responses:
        '200':
          description: OK
          schema:
            type: object
            properties:
              keys:
                type: array
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ValidationErrorResponse'
  /v1/admin/analytics/courses/{courseId}:
    get:
      security:
        - BearerAuth: []
      description: Returns per-course analytics including module completion rates, quiz stats, and enrollment over time
      produces:
        - application/json
      tags:
        - analytics
      summary: Get course analytics
      parameters:
        - type: string
          description: Course ID
          name: courseId
          in: path
          required: true
        - type: string
          description: Start date (YYYY-MM-DD)
          name: from
          in: query
        - type: string
          description: End date (YYYY-MM-DD)
          name: to
          in: query
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/analytics.CourseAnalyticsResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ValidationErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
  /v1/admin/analytics/courses/{courseId}/students:
    get:
      security:
        - BearerAuth: []
      description: Returns a paginated list of students with their progress within a specific course
      produces:
        - application/json
      tags:
        - analytics
      summary: Get course students
      parameters:
        - type: string
          description: Course ID
          name: courseId
          in: path
          required: true
        - type: integer
          default: 1
          description: Page number
          name: page
          in: query
        - type: integer
          default: 20
          description: Items per page
          name: limit
          in: query
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/analytics.CourseStudentsResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ValidationErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
  /v1/admin/analytics/overview:
    get:
      security:
        - BearerAuth: []
      description: Returns platform-wide analytics including course counts, enrollments, revenue, and daily active users
      produces:
        - application/json
      tags:
        - analytics
      summary: Get admin analytics overview
      parameters:
        - type: string
          description: Start date (YYYY-MM-DD)
          name: from
          in: query
        - type: string
          description: End date (YYYY-MM-DD)
          name: to
          in: query
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/analytics.AdminOverviewResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ValidationErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
  /v1/admin/analytics/students/{studentId}:
    get:
      security:
        - BearerAuth: []
      description: Returns analytics for a specific student including points history, course progress, and global rank
      produces:
        - application/json
      tags:
        - analytics
      summary: Get student analytics
      parameters:
        - type: string
          description: Student ID
          name: studentId
          in: path
          required: true
        - type: string
          description: Start date (YYYY-MM-DD)
          name: from
          in: query
        - type: string
          description: End date (YYYY-MM-DD)
          name: to
          in: query
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/analytics.StudentAnalyticsResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ValidationErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
  /v1/admin/audit-logs:
    get:
      security:
        - BearerAuth: []
      description: Returns paginated, filterable audit log entries
      produces:
        - application/json
      tags:
        - audit
      summary: List audit logs
      parameters:
        - type: integer
          default: 1
          description: Page number
          name: page
          in: query
        - type: integer
          default: 20
          description: Items per page
          name: limit
          in: query
        - type: string
          description: Filter by actor UUID
          name: actor_id
          in: query
        - type: string
          description: Filter by action name
          name: action
          in: query
        - type: string
          description: Filter by target type
          name: target_type
          in: query
        - type: string
          description: Filter by target UUID
          name: target_id
          in: query
        - type: string
          description: Start date (YYYY-MM-DD)
          name: from_date
          in: query
        - type: string
          description: End date (YYYY-MM-DD)
          name: to_date
          in: query
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/audit.ListAuditLogsResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ValidationErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
  /v1/admin/bookshop/books:
    get:
      security:
        - BearerAuth: []
      description: Returns the paginated admin catalog, including books hidden from the public storefront
      produces:
        - application/json
      tags:
        - bookshop
      summary: List admin books
      parameters:
        - type: integer
          default: 1
          description: Page number
          name: page
          in: query
        - type: integer
          default: 20
          description: Items per page
          name: limit
          in: query
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/bookshop.BookListResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
    post:
      security:
        - BearerAuth: []
      description: Creates a new book; digital_file_rustfs_key is stored internally and never exposed
      consumes:
        - application/json
      produces:
        - application/json
      tags:
        - bookshop
      summary: Create book
      parameters:
        - description: Book data
          name: body
          in: body
          required: true
          schema:
            type: object
      responses:
        '201':
          description: Created
          schema:
            $ref: '#/definitions/bookshop.BookResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ValidationErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
  /v1/admin/bookshop/books/{bookId}:
    patch:
      security:
        - BearerAuth: []
      description: Updates an existing book; setting is_active to false removes it from the public catalog
      consumes:
        - application/json
      produces:
        - application/json
      tags:
        - bookshop
      summary: Update book
      parameters:
        - type: string
          description: Book ID
          name: bookId
          in: path
          required: true
        - description: Book update data
          name: body
          in: body
          required: true
          schema:
            type: object
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/bookshop.BookResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ValidationErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
  /v1/admin/bookshop/orders:
    get:
      security:
        - BearerAuth: []
      description: Returns the paginated book fulfilment queue for administrators
      produces:
        - application/json
      tags:
        - bookshop
      summary: List admin book orders
      parameters:
        - type: integer
          default: 1
          description: Page number
          name: page
          in: query
        - type: integer
          default: 20
          description: Items per page
          name: limit
          in: query
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/bookshop.OrderListResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
  /v1/admin/bookshop/orders/{orderId}:
    patch:
      security:
        - BearerAuth: []
      description: Updates an order to shipped status with a tracking number
      consumes:
        - application/json
      produces:
        - application/json
      tags:
        - bookshop
      summary: Fulfil order
      parameters:
        - type: string
          description: Order ID
          name: orderId
          in: path
          required: true
        - description: Fulfilment data
          name: body
          in: body
          required: true
          schema:
            type: object
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/bookshop.OrderResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ValidationErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
  /v1/admin/bookshop/refunds:
    post:
      security:
        - BearerAuth: []
      description: Processes a refund for an order; idempotent via Idempotency-Key header
      consumes:
        - application/json
      produces:
        - application/json
      tags:
        - bookshop
      summary: Process refund
      parameters:
        - type: string
          description: Idempotency key
          name: Idempotency-Key
          in: header
        - description: Refund data
          name: body
          in: body
          required: true
          schema:
            type: object
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/bookshop.RefundResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ValidationErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
  /v1/admin/courses/{courseId}/review:
    post:
      security:
        - BearerAuth: []
      description: Approves or rejects a course that has been submitted for review by a teacher
      consumes:
        - application/json
      produces:
        - application/json
      tags:
        - courses
      summary: Review a course submission
      parameters:
        - type: string
          description: Course ID
          name: courseId
          in: path
          required: true
        - description: 'Review action: ''approve'' or ''reject'''
          name: body
          in: body
          required: true
          schema:
            type: object
            properties:
              action:
                type: string
              comment:
                type: string
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ValidationErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
  /v1/admin/moderation:
    get:
      security:
        - BearerAuth: []
      description: Returns a paginated list of flagged content awaiting moderation
      produces:
        - application/json
      tags:
        - forum
      summary: Get moderation queue
      parameters:
        - type: integer
          default: 1
          description: Page number
          name: page
          in: query
        - type: integer
          default: 20
          description: Items per page
          name: limit
          in: query
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/forum.ModerationQueueResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
  /v1/admin/moderation/{flagId}/action:
    post:
      security:
        - BearerAuth: []
      description: Executes a moderation action (e.g. remove content or ban user) on a flagged item
      consumes:
        - application/json
      produces:
        - application/json
      tags:
        - forum
      summary: Perform moderation action
      parameters:
        - type: string
          description: Flag UUID
          name: flagId
          in: path
          required: true
        - description: Moderation action payload
          name: body
          in: body
          required: true
          schema:
            type: object
            properties:
              action:
                type: string
              reason:
                type: string
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/forum.ModerationActionResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ValidationErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
  /v1/admin/notifications/broadcast:
    post:
      security:
        - BearerAuth: []
      description: Sends a broadcast notification to all users or a specific role
      consumes:
        - application/json
      produces:
        - application/json
      tags:
        - notifications
      summary: Send broadcast notification
      parameters:
        - description: Broadcast data
          name: body
          in: body
          required: true
          schema:
            type: object
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/notifications.BroadcastResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ValidationErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
  /v1/admin/notifications/templates:
    get:
      security:
        - BearerAuth: []
      description: Returns configurable notification templates
      produces:
        - application/json
      tags:
        - notifications
      summary: List notification templates
      responses:
        '200':
          description: OK
          schema:
            type: array
            items:
              $ref: '#/definitions/notifications.TemplateResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
  /v1/admin/notifications/templates/{templateId}:
    patch:
      security:
        - BearerAuth: []
      description: Updates a notification template's subject and body
      consumes:
        - application/json
      produces:
        - application/json
      tags:
        - notifications
      summary: Update notification template
      parameters:
        - type: string
          description: Template ID
          name: templateId
          in: path
          required: true
        - description: Template update data
          name: body
          in: body
          required: true
          schema:
            type: object
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/notifications.TemplateResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ValidationErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
  /v1/admin/payments:
    get:
      security:
        - BearerAuth: []
      description: Returns a paginated list of all platform transactions with optional filters (admin only)
      produces:
        - application/json
      tags:
        - payments
      summary: List all payments
      parameters:
        - type: integer
          default: 1
          description: Page number
          name: page
          in: query
        - type: integer
          default: 20
          description: Items per page
          name: limit
          in: query
        - type: string
          description: Filter by student ID
          name: student_id
          in: query
        - type: string
          description: Filter by item type (course, book)
          name: item_type
          in: query
        - type: string
          description: Filter by payment status
          name: status
          in: query
        - type: string
          description: Filter from date (RFC3339)
          name: from_date
          in: query
        - type: string
          description: Filter to date (RFC3339)
          name: to_date
          in: query
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/payments.AdminPaymentListResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ValidationErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
  /v1/admin/points/config:
    patch:
      security:
        - BearerAuth: []
      description: Admin updates the platform-wide points configuration for video completions, quiz passes, and perfect score bonuses
      consumes:
        - application/json
      produces:
        - application/json
      tags:
        - points
      summary: Update points configuration
      parameters:
        - description: Points configuration update
          name: body
          in: body
          schema:
            type: object
            properties:
              bonus_points_perfect_score:
                type: integer
              points_per_quiz_pass:
                type: integer
              points_per_video:
                type: integer
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/points.PointsConfigResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ValidationErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
  /v1/admin/rbac/roles:
    get:
      security:
        - BearerAuth: []
      description: Returns all roles with their current permission sets
      produces:
        - application/json
      tags:
        - rbac
      summary: List roles
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/rbac.ListRolesResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
  /v1/admin/rbac/roles/{roleId}:
    patch:
      security:
        - BearerAuth: []
      description: Replaces the permission set for the specified role
      consumes:
        - application/json
      produces:
        - application/json
      tags:
        - rbac
      summary: Update role permissions
      parameters:
        - type: string
          description: Role ID
          name: roleId
          in: path
          required: true
        - description: Permissions payload
          name: body
          in: body
          required: true
          schema:
            type: object
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/rbac.UpdateRolePermissionsResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ValidationErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
  /v1/admin/system/settings:
    get:
      security:
        - BearerAuth: []
      description: Returns the current platform settings
      produces:
        - application/json
      tags:
        - system-config
      summary: Get system settings
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/system_config.SettingsResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
    patch:
      security:
        - BearerAuth: []
      description: Applies a partial update to platform settings
      consumes:
        - application/json
      produces:
        - application/json
      tags:
        - system-config
      summary: Update system settings
      parameters:
        - description: Settings update data
          name: body
          in: body
          required: true
          schema:
            type: object
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/system_config.SettingsResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ValidationErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
  /v1/admin/system/settings/history:
    get:
      security:
        - BearerAuth: []
      description: Returns paginated settings change history
      produces:
        - application/json
      tags:
        - system-config
      summary: Get settings history
      parameters:
        - type: integer
          default: 1
          description: Page number
          name: page
          in: query
        - type: integer
          default: 20
          description: Items per page
          name: limit
          in: query
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/system_config.SettingsHistoryResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
  /v1/admin/system/settings/rollback/{historyId}:
    post:
      security:
        - BearerAuth: []
      description: Restores platform settings to a historical snapshot
      produces:
        - application/json
      tags:
        - system-config
      summary: Rollback settings
      parameters:
        - type: string
          description: History entry ID
          name: historyId
          in: path
          required: true
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/system_config.RollbackResponse'
        '400':
          description: Bad Request
