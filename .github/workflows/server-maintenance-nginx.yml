name: Server Maintenance Nginx

on:
  workflow_dispatch:

jobs:
  configure-nginx:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.SERVER_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Point Nginx root endpoint to frontend
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" <<'REMOTE'
          set -euo pipefail

          if ! command -v nginx >/dev/null 2>&1; then
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y nginx
          fi

          cat >/etc/nginx/sites-available/inspire-lms.conf <<'NGINX'
          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              server_name 193.203.160.212 _;

              client_max_body_size 100m;

              location / {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_read_timeout 60s;
              }

              location /v1/ {
                  proxy_pass http://127.0.0.1:8080;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_read_timeout 60s;
              }

              location = /health {
                  proxy_pass http://127.0.0.1:8080/health;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
          NGINX

          rm -f /etc/nginx/sites-enabled/default
          ln -sfn /etc/nginx/sites-available/inspire-lms.conf /etc/nginx/sites-enabled/inspire-lms.conf
          nginx -t
          systemctl enable nginx
          systemctl reload nginx || systemctl restart nginx
          curl -fsS -I http://127.0.0.1/ | head -n 1
          curl -fsS http://127.0.0.1/health
          REMOTE
