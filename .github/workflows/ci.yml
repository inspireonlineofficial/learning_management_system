name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'
          cache: true

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following Go files are not formatted correctly according to gofmt:"
            gofmt -l .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run unit tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Verify build
        run: go build -v -o /dev/null ./cmd/server/main.go

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check code formatting
        run: npx prettier --check .

      - name: Run linter
        run: npm run lint

      # - name: Run TypeScript check
      #   run: npx tsc --noEmit

      - name: Verify build
        run: npm run build

  docker-verification:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: inspire-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: inspire-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs:
      - secret-scan
      - backend-ci
      - frontend-ci
      - docker-verification
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Prepare production configuration
        env:
          PROD_ENV: ${{ secrets.PROD_ENV }}
        run: |
          set -euo pipefail
          install -m 700 -d .deploy/keys
          printf '%s\n' "$PROD_ENV" \
            | perl -0 -e '
                use strict;
                use warnings;

                my $env = <STDIN>;
                $env =~ s/\\r\\n/\n/g;
                $env =~ s/\\n/\n/g;

                sub write_pem {
                  my ($env_ref, $name, $path) = @_;
                  return unless $$env_ref =~ /^$name=(.*?)(?=^[A-Za-z_][A-Za-z0-9_]*=|\z)/ms;

                  my $pem = $1;
                  $pem =~ s/^\s+|\s+\z//g;
                  $pem =~ s/^"//;
                  $pem =~ s/"\z//;
                  $pem =~ s/^\x27//;
                  $pem =~ s/\x27\z//;
                  $pem =~ s/\\r\\n/\n/g;
                  $pem =~ s/\\n/\n/g;
                  $pem =~ s/\r\n/\n/g;

                  open my $fh, ">", $path or die "cannot write $path: $!";
                  print {$fh} $pem;
                  print {$fh} "\n" unless $pem =~ /\n\z/;
                  close $fh;
                  chmod 0600, $path;

                  $$env_ref =~ s/^$name=.*?(?=^[A-Za-z_][A-Za-z0-9_]*=|\z)//ms;
                }

                write_pem(\$env, "JWT_PRIVATE_KEY", ".deploy/keys/private.pem");
                write_pem(\$env, "JWT_PUBLIC_KEY", ".deploy/keys/public.pem");

                $env =~ s/^JWT_PRIVATE_KEY_PATH=.*\n?//mg;
                $env =~ s/^JWT_PUBLIC_KEY_PATH=.*\n?//mg;
                $env =~ s/\n+\z/\n/s;
                $env .= "JWT_PRIVATE_KEY_PATH=keys/private.pem\n";
                $env .= "JWT_PUBLIC_KEY_PATH=keys/public.pem\n";

                open my $out, ">", ".deploy/.env" or die "cannot write .deploy/.env: $!";
                print {$out} $env;
                close $out;
                chmod 0600, ".deploy/.env";
              '

      - name: Upload release files
        run: |
          set -euo pipefail
          tar \
            --exclude='.git' \
            --exclude='coverage.out' \
            --exclude='.deploy' \
            --exclude='frontend/.output' \
            --exclude='frontend/node_modules' \
            --exclude='node_modules' \
            -czf - . \
            | ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
                "mkdir -p '$DEPLOY_PATH' && tar -xzf - -C '$DEPLOY_PATH'"

      - name: Upload production configuration
        run: |
          set -euo pipefail
          tar -C .deploy -czf - .env keys \
            | ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
                "umask 077 && tar -xzf - -C '$DEPLOY_PATH'"

      - name: Rebuild and restart services
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            "cd '$DEPLOY_PATH' && docker compose --env-file .env up -d --build --remove-orphans"
